[tool.ruff]
target-version = "py311"
line-length = 100
src = ["duckdb", "mesh", "autoscaler", "runtime", "agents/composio_bridge", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ASYNC", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-q --strict-markers --tb=short"

[tool.coverage.run]
source = ["duckdb", "mesh", "autoscaler", "runtime", "agents/composio_bridge"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 0
show_missing = true
