services:
  # CORE INFRA - Event backbone
  nats:
    image: nats:latest
    container_name: ark-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ark-net

  # CORE INFRA - Service mesh
  mesh-registry:
    build:
      context: .
      dockerfile: Dockerfile.mesh
    container_name: ark-mesh
    environment:
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    ports:
      - "7000:7000"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7000/api/mesh"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ark-net

  # CORE INFRA - Autoscaler
  autoscaler:
    build:
      context: .
      dockerfile: Dockerfile.autoscaler
    container_name: ark-autoscaler
    environment:
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    ports:
      - "7001:7001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ark-net
    # REMOVED: privileged: true — grants full host root access; Docker socket mount is sufficient

  # CORE INFRA - Truth layer
  duckdb:
    build:
      context: .
      dockerfile: Dockerfile.duckdb
    container_name: ark-duckdb
    working_dir: /app
    ports:
      - "7777:7777"
    volumes:
      - duckdb_data:/data
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - ark-net

  # CORE INFRA - API Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: ark-gateway
    environment:
      NATS_URL: nats://nats:4222
      MESH_URL: http://ark-mesh:7000
      PYTHONUNBUFFERED: "1"
    ports:
      - "8080:8080"
    depends_on:
      mesh-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ark-net

  # ANALYSIS - Rust ARK Core
  ark:
    build:
      context: .
      dockerfile: Dockerfile.ark
    container_name: ark-core
    environment:
      RUST_LOG: info
    ports:
      - "9999:9999"
    depends_on:
      duckdb:
        condition: service_started
      nats:
        condition: service_healthy
    networks:
      - ark-net

  # INTELLIGENCE LAYER - Composio Bridge
  composio:
    build:
      context: .
      dockerfile: Dockerfile.composio
    container_name: ark-composio
    environment:
      INSTANCE_ID: composio-0
      NATS_URL: nats://nats:4222
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    ports:
      - "6003:6003"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - ark-net

  # EMITTERS - Home Assistant Event Bridge
  ha-emitter:
    build:
      context: .
      dockerfile: Dockerfile.ha-emitter
    container_name: ark-ha-emitter
    environment:
      INSTANCE_ID: ha-emitter-0
      NATS_URL: nats://nats:4222
      HA_URL: http://homeassistant:8123
      HA_TOKEN: ${HA_TOKEN:-}
      PYTHONUNBUFFERED: "1"
    ports:
      - "6010:6010"
    depends_on:
      nats:
        condition: service_healthy
      homeassistant:
        condition: service_started
    networks:
      - ark-net

  # EMITTERS - Jellyfin Media Events
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: ark-jellyfin
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_data:/config
      - jellyfin_cache:/cache
    environment:
      TZ: UTC
    networks:
      - ark-net

  jellyfin-emitter:
    build:
      context: .
      dockerfile: Dockerfile.jellyfin-emitter
    container_name: ark-jellyfin-emitter
    environment:
      INSTANCE_ID: jellyfin-emitter-0
      NATS_URL: nats://nats:4222
      JELLYFIN_URL: http://jellyfin:8096
      JELLYFIN_TOKEN: ${JELLYFIN_TOKEN:-}
      JELLYFIN_USER_ID: ${JELLYFIN_USER_ID:-}
      PYTHONUNBUFFERED: "1"
    ports:
      - "6011:6011"
    depends_on:
      nats:
        condition: service_healthy
      jellyfin:
        condition: service_started
    networks:
      - ark-net

  # EMITTERS - UniFi Network Events
  unifi:
    image: linuxserver/unifi-controller:latest
    container_name: ark-unifi
    ports:
      - "3478:3478/udp"
      - "10001:10001/udp"
      - "8880:8080"
      - "8443:8443"
      - "1900:1900/udp"
      - "5514:5514/udp"
    volumes:
      - unifi_data:/config
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      MEM_LIMIT: 1024
    networks:
      - ark-net

  unifi-emitter:
    build:
      context: .
      dockerfile: Dockerfile.unifi-emitter
    container_name: ark-unifi-emitter
    environment:
      INSTANCE_ID: unifi-emitter-0
      NATS_URL: nats://nats:4222
      UNIFI_URL: https://unifi:8443
      UNIFI_USERNAME: ${UNIFI_USERNAME:-}
      UNIFI_PASSWORD: ${UNIFI_PASSWORD:-}
      UNIFI_SITE: ${UNIFI_SITE:-default}
      PYTHONUNBUFFERED: "1"
    ports:
      - "6012:6012"
    depends_on:
      nats:
        condition: service_healthy
      unifi:
        condition: service_started
    networks:
      - ark-net

  # EXECUTION LAYER - n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: ark-n8n
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: sqlite
      DB_SQLITE_PATH: /data/n8n.db
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_TUNNEL_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - ark-net

  # EXECUTION LAYER - Home Assistant
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    container_name: ark-homeassistant
    ports:
      - "8123:8123"
    volumes:
      - ha_data:/config
    environment:
      TZ: UTC
    networks:
      - ark-net

  # STORAGE - MinIO
  minio:
    image: minio/minio:latest
    container_name: ark-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/minio/data
    command: server /minio/data --console-address ":9001"
    networks:
      - ark-net

  # OBSERVABILITY - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: ark-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?Set GF_ADMIN_PASSWORD in .env}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - ark-net

  # OBSERVABILITY - Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: ark-meilisearch
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY in .env}
    networks:
      - ark-net


  # ARK-FIELD v4.2 - Stage 1/2 Redis state backend
  redis:
    image: redis:7-alpine
    container_name: ark-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ark-net

  # ARK-FIELD v4.2 - Stage 1/2 Stability Kernel
  stability-kernel:
    build:
      context: .
      dockerfile: Dockerfile.stability-kernel
    container_name: ark-stability-kernel
    environment:
      HTTP_ADDR: ":8081"
      ENTROPY_GUARD: "1.0"
      G_MAX: "0.8"
      SIGMA_K: "2.2"
      HYSTERESIS_LAMBDA: "0.08"
      BACKPRESSURE_EPS: "0.1"
      TIME_DECAY_RATE: "0.2"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ark-net

  # ARK-FIELD v4.2 - Stage 1/2 Ingestion Leader (single writer)
  ingestion-leader:
    build:
      context: .
      dockerfile: Dockerfile.ingestion-leader
    container_name: ark-ingestion-leader
    environment:
      HTTP_ADDR: ":8080"
      NATS_URL: nats://nats:4222
      REDIS_ADDR: redis:6379
      ENTROPY_GUARD: "1.0"
      G_MAX: "0.8"
      SIGMA_K: "2.2"
      HYSTERESIS_LAMBDA: "0.08"
      BACKPRESSURE_EPS: "0.1"
      TIME_DECAY_RATE: "0.2"
      CAS_ROOT: /cas
    ports:
      - "8088:8080"
    volumes:
      - /mnt/nas:/cas
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      stability-kernel:
        condition: service_started
    networks:
      - ark-net

  # ARK-FIELD v4.2 - Stage 1/2 NetWatch
  netwatch:
    build:
      context: .
      dockerfile: Dockerfile.netwatch
    container_name: ark-netwatch
    environment:
      HTTP_ADDR: ":8082"
      STABILITY_KERNEL_URL: http://stability-kernel:8081
      WG_STATUS_SOURCE: /etc/wireguard
    ports:
      - "8082:8082"
    depends_on:
      stability-kernel:
        condition: service_started
      wireguard:
        condition: service_started
    networks:
      - ark-net

  # ARK-FIELD v4.2 - WireGuard mesh sidecar
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: ark-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      SERVERURL: auto
      SERVERPORT: 51820
      PEERS: 3
      PEERDNS: auto
    ports:
      - "51820:51820/udp"
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped
    networks:
      - ark-net


  # ARK-FIELD v4.2 - Stage 4 MQTT bridge
  mqtt-bridge:
    build:
      context: .
      dockerfile: Dockerfile.mqtt-bridge
    container_name: ark-mqtt-bridge
    environment:
      HTTP_ADDR: ":8090"
      NATS_URL: nats://nats:4222
      ENTROPY_GUARD: "1.0"
      G_MAX: "0.8"
      SIGMA_K: "2.2"
      HYSTERESIS_LAMBDA: "0.08"
      BACKPRESSURE_EPS: "0.1"
      TIME_DECAY_RATE: "0.2"
    ports:
      - "8090:8090"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - ark-net

networks:
  ark-net:
    driver: bridge

volumes:
  nats_data:
  duckdb_data:
  n8n_data:
  ha_data:
  minio_data:
  grafana_data:
  meilisearch_data:
  jellyfin_data:
  jellyfin_cache:
  unifi_data:

  redis_data:
  wireguard_config:
