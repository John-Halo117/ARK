version: '3.9'

# Production Docker Compose Stack - COMPLETE & WIRED
# All variables from .env, auto-generated configs, full validation
# Run: bash init-prod.sh && docker compose up -d

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      TZ: ${TZ:-UTC}
      TRAEFIK_LOG_LEVEL: ${TRAEFIK_LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /srv/traefik/acme.json:/acme.json
      - /srv/traefik/logs:/var/log/traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: "Host(`traefik.${TOP_LEVEL_DOMAIN:-example.com}`)"
      traefik.http.routers.traefik.service: "api@internal"
      traefik.http.routers.traefik.middlewares: "authelia@file"
      traefik.http.routers.traefik.entrypoints: "websecure"
      traefik.http.routers.traefik.tls: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - authelia

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    networks:
      - proxy
    expose:
      - 6379
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - /srv/redis/data:/data
      - /srv/redis/logs:/var/log/redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  authelia:
    image: authelia/authelia:4.38.5
    container_name: authelia
    restart: always
    networks:
      - proxy
    expose:
      - 9091
    environment:
      TZ: ${TZ:-UTC}
      AUTHELIA_LOG_LEVEL: ${AUTHELIA_LOG_LEVEL:-info}
      AUTHELIA_TOTP_SECRET: ${AUTHELIA_TOTP_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
      - /srv/authelia/data:/data
      - /srv/authelia/logs:/var/log/authelia
    labels:
      traefik.enable: "true"
      traefik.http.routers.authelia.rule: "Host(`auth.${TOP_LEVEL_DOMAIN:-example.com}`) && PathPrefix(`/api/authz`)"
      traefik.http.routers.authelia.service: "authelia"
      traefik.http.routers.authelia.entrypoints: "websecure"
      traefik.http.routers.authelia.tls: "true"
      traefik.http.services.authelia.loadbalancer.server.port: "9091"
      traefik.http.services.authelia.loadbalancer.server.scheme: "http"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  navidrome:
    image: deluan/navidrome:0.51.1
    container_name: navidrome
    restart: always
    networks:
      - proxy
    expose:
      - 4533
    environment:
      TZ: ${TZ:-UTC}
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
      ND_UIVOLUME: 1.0
      ND_LOGLEVEL: info
      ND_SCANINTERVAL: 3600
      ND_TRANSCODEMP3: "true"
      ND_SESSIONTIMEOUT: 24
    volumes:
      - ${MUSIC_PATH:-/srv/navidrome/music}:/music:ro
      - ${DATA_PATH:-/srv/navidrome/data}:/data
      - /srv/navidrome/logs:/var/log/navidrome
    labels:
      traefik.enable: "true"
      traefik.http.routers.navidrome.rule: "Host(`music.${DOMAIN:-music.example.com}`)"
      traefik.http.routers.navidrome.service: "navidrome"
      traefik.http.routers.navidrome.middlewares: "authelia@file"
      traefik.http.routers.navidrome.entrypoints: "websecure"
      traefik.http.routers.navidrome.tls: "true"
      traefik.http.services.navidrome.loadbalancer.server.port: "4533"
      traefik.http.services.navidrome.loadbalancer.server.scheme: "http"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      authelia:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4533/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  home-assistant:
    image: homeassistant/home-assistant:2024.2.0
    container_name: home-assistant
    restart: always
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - /srv/home-assistant/config:/config
      - /srv/home-assistant/logs:/var/log/homeassistant
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
