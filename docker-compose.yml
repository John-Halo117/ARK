services:
  nats:
    image: nats:2.11-alpine
    container_name: ark-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ark-field]

  redis:
    image: redis:7-alpine
    container_name: ark-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ark-field]

  stability-kernel:
    build:
      context: .
      dockerfile: Dockerfile.stability-kernel
    container_name: ark-stability-kernel
    environment:
      HTTP_ADDR: ":8081"
      STABILITY_ALPHA_MAX: "0.3"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks: [ark-field]

  ingestion-leader:
    build:
      context: .
      dockerfile: Dockerfile.ingestion-leader
    container_name: ark-ingestion-leader
    environment:
      HTTP_ADDR: ":8080"
      NATS_URL: nats://nats:4222
      REDIS_ADDR: redis:6379
      STABILITY_KERNEL_URL: http://stability-kernel:8081
      CAS_ROOT: /cas
    ports:
      - "8080:8080"
    volumes:
      - /mnt/nas:/cas
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      stability-kernel:
        condition: service_started
    networks: [ark-field]

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: ark-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      SERVERURL: auto
      SERVERPORT: 51820
      PEERS: 3
      PEERDNS: auto
    ports:
      - "51820:51820/udp"
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped
    networks: [ark-field]

  netwatch:
    build:
      context: .
      dockerfile: Dockerfile.netwatch
    container_name: ark-netwatch
    environment:
      HTTP_ADDR: ":8082"
      STABILITY_KERNEL_URL: http://stability-kernel:8081
      WG_STATUS_SOURCE: /etc/wireguard
    ports:
      - "8082:8082"
    depends_on:
      stability-kernel:
        condition: service_started
      wireguard:
        condition: service_started
    networks: [ark-field]

networks:
  ark-field:
    driver: bridge

volumes:
  nats_data:
  redis_data:
  wireguard_config:
