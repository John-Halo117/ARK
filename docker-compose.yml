services:
  # CORE INFRA - Event backbone
  nats:
    image: nats:latest
    container_name: ark-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    networks:
      - ark-net

  # CORE INFRA - Service mesh
  mesh-registry:
    build:
      context: .
      dockerfile: Dockerfile.mesh
    container_name: ark-mesh
    environment:
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    ports:
      - "7000:7000"
    depends_on:
      - nats
    networks:
      - ark-net

  # CORE INFRA - Autoscaler
  autoscaler:
    build:
      context: .
      dockerfile: Dockerfile.autoscaler
    container_name: ark-autoscaler
    environment:
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    ports:
      - "7001:7001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nats
    networks:
      - ark-net
    privileged: true

  # CORE INFRA - Truth layer
  duckdb:
    image: python:3.11-slim
    container_name: ark-duckdb
    working_dir: /app
    volumes:
      - duckdb_data:/data
    environment:
      PYTHONUNBUFFERED: "1"
    command: python -c "import duckdb, time; conn = duckdb.connect('/data/ark.duckdb'); conn.execute('CREATE TABLE IF NOT EXISTS events (id INTEGER PRIMARY KEY, type VARCHAR, payload JSON, created_at TIMESTAMP DEFAULT now())'); conn.execute('CREATE TABLE IF NOT EXISTS state (key VARCHAR PRIMARY KEY, value JSON, updated_at TIMESTAMP DEFAULT now())'); conn.execute('CREATE TABLE IF NOT EXISTS metrics (name VARCHAR, value DOUBLE, timestamp TIMESTAMP, sample_time TIMESTAMP DEFAULT now())'); print('[DuckDB] Ready'); [time.sleep(1) for _ in iter(int, 1)]"
    networks:
      - ark-net

  # INTELLIGENCE LAYER - OpenCode
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    container_name: ark-opencode
    environment:
      INSTANCE_ID: opencode-0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    depends_on:
      - nats
    networks:
      - ark-net

  # INTELLIGENCE LAYER - OpenWolf
  openwolf:
    build:
      context: .
      dockerfile: Dockerfile.openwolf
    container_name: ark-openwolf
    environment:
      INSTANCE_ID: openwolf-0
      NATS_URL: nats://nats:4222
      PYTHONUNBUFFERED: "1"
    depends_on:
      - nats
    networks:
      - ark-net

  # INTELLIGENCE LAYER - Composio Bridge
  composio:
    build:
      context: .
      dockerfile: Dockerfile.composio
    container_name: ark-composio
    environment:
      INSTANCE_ID: composio-0
      NATS_URL: nats://nats:4222
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    depends_on:
      - nats
    networks:
      - ark-net

  # EXECUTION LAYER - n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: ark-n8n
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: sqlite
      DB_SQLITE_PATH: /data/n8n.db
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_TUNNEL_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - nats
    networks:
      - ark-net

  # EXECUTION LAYER - Home Assistant
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    container_name: ark-homeassistant
    ports:
      - "8123:8123"
    volumes:
      - ha_data:/config
    environment:
      TZ: UTC
    networks:
      - ark-net

  # STORAGE - MinIO
  minio:
    image: minio/minio:latest
    container_name: ark-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio/data
    command: server /minio/data --console-address ":9001"
    networks:
      - ark-net

  # OBSERVABILITY - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: ark-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - ark-net

  # OBSERVABILITY - Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: ark-meilisearch
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      MEILI_ENV: production
    networks:
      - ark-net

  # EMITTERS - Home Assistant Event Bridge
  ha-emitter:
    build:
      context: .
      dockerfile: Dockerfile.ha-emitter
    container_name: ark-ha-emitter
    environment:
      INSTANCE_ID: ha-emitter-0
      NATS_URL: nats://nats:4222
      HA_URL: http://homeassistant:8123
      HA_TOKEN: ${HA_TOKEN:-}
      PYTHONUNBUFFERED: "1"
    depends_on:
      - nats
      - homeassistant
    networks:
      - ark-net

  # EMITTERS - Jellyfin Media Events
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: ark-jellyfin
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_data:/config
      - jellyfin_cache:/cache
    environment:
      TZ: UTC
    networks:
      - ark-net

  jellyfin-emitter:
    build:
      context: .
      dockerfile: Dockerfile.jellyfin-emitter
    container_name: ark-jellyfin-emitter
    environment:
      INSTANCE_ID: jellyfin-emitter-0
      NATS_URL: nats://nats:4222
      JELLYFIN_URL: http://jellyfin:8096
      JELLYFIN_TOKEN: ${JELLYFIN_TOKEN:-}
      JELLYFIN_USER_ID: ${JELLYFIN_USER_ID:-}
      PYTHONUNBUFFERED: "1"
    depends_on:
      - nats
      - jellyfin
    networks:
      - ark-net

  # EMITTERS - UniFi Network Events
  unifi:
    image: linuxserver/unifi-controller:latest
    container_name: ark-unifi
    ports:
      - "3478:3478/udp"
      - "10001:10001/udp"
      - "8080:8080"
      - "8443:8443"
      - "1900:1900/udp"
      - "5514:5514/udp"
    volumes:
      - unifi_data:/config
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      MEM_LIMIT: 1024
    networks:
      - ark-net

  unifi-emitter:
    build:
      context: .
      dockerfile: Dockerfile.unifi-emitter
    container_name: ark-unifi-emitter
    environment:
      INSTANCE_ID: unifi-emitter-0
      NATS_URL: nats://nats:4222
      UNIFI_URL: https://unifi:8443
      UNIFI_USERNAME: ${UNIFI_USERNAME:-}
      UNIFI_PASSWORD: ${UNIFI_PASSWORD:-}
      UNIFI_SITE: ${UNIFI_SITE:-default}
      PYTHONUNBUFFERED: "1"
    depends_on:
      - nats
      - unifi
    networks:
      - ark-net

networks:
  ark-net:
    driver: bridge

volumes:
  nats_data:
  duckdb_data:
  n8n_data:
  ha_data:
  minio_data:
  grafana_data:
  meilisearch_data:
  jellyfin_data:
  jellyfin_cache:
  unifi_data:
